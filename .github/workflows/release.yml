# .github/workflows/release.yml
name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    name: Build and Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Type check
        run: bun run typecheck

      - name: Run tests
        run: bun run test

      - name: Build JS dist (for npm)
        run: bun run build

      - name: Build cross-platform binaries
        run: bash scripts/build-binaries.sh

      - name: Generate checksums
        run: cd dist/bins && sha256sum * > checksums.txt

      - name: Create GitHub Release
        run: |
          # Keep GitHub-generated release notes for now; CHANGELOG.md is maintained manually.
          gh release create "${{ github.ref_name }}" \
            --title "ku-signal ${{ github.ref_name }}" \
            --generate-notes || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload release assets
        run: |
          gh release upload "${{ github.ref_name }}" \
            dist/bins/ku-signal_linux_amd64 \
            dist/bins/ku-signal_linux_arm64 \
            dist/bins/ku-signal_darwin_amd64 \
            dist/bins/ku-signal_darwin_arm64 \
            "dist/bins/ku-signal_windows_amd64.exe" \
            dist/bins/checksums.txt \
            --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Smoke test install script against released linux binary
        run: |
          KU_SIGNAL_VERSION="${GITHUB_REF_NAME#v}" bash install.sh
        env:
          GITHUB_REF_NAME: ${{ github.ref_name }}

      - name: Setup Node for npm publish
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: Publish to npm
        run: |
          if [ -z "$NODE_AUTH_TOKEN" ]; then
            echo "NPM_TOKEN is not set; skipping npm publish."
            exit 0
          fi

          npm publish --access public --ignore-scripts
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
