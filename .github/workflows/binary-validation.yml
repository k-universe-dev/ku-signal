name: Binary Validation

on:
  push:
    branches:
      - master
      - main
  pull_request:
    branches:
      - master
      - main
  workflow_dispatch:

concurrency:
  group: "${{ github.workflow }}-${{ github.ref }}"
  cancel-in-progress: true

jobs:
  build-binaries:
    name: build-binaries
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build cross-platform binaries
        run: bash scripts/build-binaries.sh

      - name: Upload binaries
        uses: actions/upload-artifact@v4
        with:
          name: ku-signal-binaries
          path: dist/bins/*
          if-no-files-found: error

  validate-linux-amd64:
    name: validate-linux-amd64
    runs-on: ubuntu-latest
    needs: build-binaries

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Download binaries
        uses: actions/download-artifact@v4
        with:
          name: ku-signal-binaries
          path: dist/bins

      - name: Smoke test linux amd64 binary
        run: |
          chmod +x dist/bins/ku-signal_linux_amd64
          bun run scripts/smoke-binary.ts ./dist/bins/ku-signal_linux_amd64

  validate-linux-arm64:
    name: validate-linux-arm64
    runs-on: ubuntu-latest
    needs: build-binaries

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Download binaries
        uses: actions/download-artifact@v4
        with:
          name: ku-signal-binaries
          path: dist/bins

      - name: Install QEMU
        run: |
          sudo apt-get update
          sudo apt-get install -y qemu-user-static

      - name: Smoke test linux arm64 binary
        run: |
          chmod +x dist/bins/ku-signal_linux_arm64
          EXPECTED="$(bun --print "JSON.parse(await Bun.file('package.json').text()).version")"
          ACTUAL="$(qemu-aarch64-static ./dist/bins/ku-signal_linux_arm64 --version)"
          test "$ACTUAL" = "$EXPECTED"

  validate-windows-amd64:
    name: validate-windows-amd64
    runs-on: windows-latest
    needs: build-binaries

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Download binaries
        uses: actions/download-artifact@v4
        with:
          name: ku-signal-binaries
          path: dist/bins

      - name: Smoke test windows amd64 binary
        run: bun run scripts/smoke-binary.ts .\dist\bins\ku-signal_windows_amd64.exe

  validate-darwin-amd64:
    name: validate-darwin-amd64
    runs-on: macos-13
    needs: build-binaries

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Download binaries
        uses: actions/download-artifact@v4
        with:
          name: ku-signal-binaries
          path: dist/bins

      - name: Smoke test darwin amd64 binary
        run: |
          chmod +x dist/bins/ku-signal_darwin_amd64
          bun run scripts/smoke-binary.ts ./dist/bins/ku-signal_darwin_amd64

  validate-darwin-arm64:
    name: validate-darwin-arm64
    runs-on: macos-14
    needs: build-binaries

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Download binaries
        uses: actions/download-artifact@v4
        with:
          name: ku-signal-binaries
          path: dist/bins

      - name: Smoke test darwin arm64 binary
        run: |
          chmod +x dist/bins/ku-signal_darwin_arm64
          bun run scripts/smoke-binary.ts ./dist/bins/ku-signal_darwin_arm64
